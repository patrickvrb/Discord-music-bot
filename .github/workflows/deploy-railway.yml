name: Test and deploy to Railway

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        env:
          DISCORD_BOT_KEY: test-token
        run: python -m unittest discover -s tests -v

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: railway-production
      cancel-in-progress: false
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check deployment configuration
        shell: bash
        run: |
          if [[ -z "$RAILWAY_TOKEN" ]]; then
            echo "::error::Add a Railway project token as the RAILWAY_TOKEN GitHub secret."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Railway CLI
        run: npm install --global @railway/cli@5.27.0

      - name: Deploy worker
        run: railway up --ci --service discord-music-bot
